<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - My Account</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-surface font-sans text-white bg-dots min-h-screen">
    <!-- Ambient background -->
    <div class="fixed inset-0 bg-mesh pointer-events-none"></div>

    <!-- Remove Friend Confirmation Modal -->
    <div id="removeFrndDiv" class="hidden fixed inset-0 z-50 justify-center items-center bg-black/60 backdrop-blur-sm">
        <div class="card max-w-sm w-[90%] animate-scale-in p-6 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-14 h-14 rounded-2xl bg-red-500/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-red-400" style="font-size: 28px;">person_remove</span>
                </div>
            </div>
            <h3 class="text-white font-semibold text-lg mb-2">Remove Friend</h3>
            <p class="text-white/50 text-sm mb-6">Are you sure you want to remove this friend from your list?</p>
            <div class="flex justify-center gap-3">
                <button id="noRemove" class="btn-outline py-2 px-6">Cancel</button>
                <button id="yesRemove" class="bg-red-500 hover:bg-red-400 text-white font-semibold py-2 px-6 rounded-xl transition-colors">Remove</button>
            </div>
        </div>
    </div>
    
    <div id="alertDiv" class="fixed top-20 flex flex-col justify-center items-center w-screen z-[100] gap-2">
    </div>

    <div id="bufferingDiv" class="hidden flex-col gap-3 items-center fixed inset-0 z-[100] justify-center bg-black/70 backdrop-blur-sm">
        <div id="showMessage" class="text-white text-xl text-center font-semibold"> Please wait.... </div>
        <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></dotlottie-player>
    </div>

    <div id="frndReqDiv" class="overflow-hidden fixed w-screen bottom-10 z-[90]">
    </div>

    <form id="imageForm">
        <input id="avatarInput" name="avatar" class="hidden" type="file">
    </form>
    
    <header class="sticky inset-x-0 top-0 z-50 w-full glass border-b border-white/5 px-4">
        <nav class="mx-auto flex max-w-7xl justify-between items-center py-3">
            <a href="/home" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow group-hover:shadow-glow-lg transition-shadow duration-300">
                    <span class="text-white font-display font-bold text-lg">Q</span>
                </div>
                <span class="font-display font-bold text-xl gradient-text hidden sm:block">QUIZ ARENA</span>
            </a>
            
            <button id="logOut" class="btn-outline py-2 px-4 text-sm flex items-center gap-2">
                <span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
                Log out
            </button>
        </nav>
    </header>

    <section class="relative max-w-2xl mx-auto px-4 py-6"> 
        <!-- Profile Card -->
        <div class="card p-6 mb-6 animate-slide-up">
            <div class="flex items-start gap-5">
                <div class="relative shrink-0">
                    <img id="avatar" class="rounded-2xl object-cover w-24 h-24 sm:w-28 sm:h-28 ring-2 ring-accent/30">
                    <button id="editAvatar" class="absolute -bottom-1.5 -right-1.5 w-8 h-8 bg-gradient-to-br from-accent-dark to-accent rounded-xl flex items-center justify-center shadow-glow cursor-pointer hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-white" style="font-size: 16px;">edit</span>
                    </button>
                    <button id="saveAvatar" class="hidden absolute -bottom-1.5 -right-1.5 w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg cursor-pointer hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-white" style="font-size: 16px;">save</span>
                    </button>
                </div>
                <div class="flex-1 min-w-0 space-y-2 pt-1">
                    <h2 id="fullname" class="font-display font-bold text-xl sm:text-2xl text-white truncate"></h2>
                    <div class="flex items-center gap-2">
                        <span id="username" class="text-sm text-white/50 bg-white/5 px-3 py-1 rounded-lg cursor-pointer hover:bg-white/10 transition-colors font-mono"></span>
                    </div>
                    <div class="flex gap-4 pt-1">
                        <div class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-emerald-400" style="font-size: 18px;">thumb_up</span>
                            <span id="likes" class="text-sm font-semibold text-emerald-400"></span>
                            <span class="text-xs text-white/30">likes</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-amber-400" style="font-size: 18px;">star</span>
                            <span id="totalPoints" class="text-sm font-semibold text-amber-400"></span>
                            <span class="text-xs text-white/30">points</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Friend List -->
        <div class="animate-slide-up" style="animation-delay: 0.1s;">
            <h3 class="font-display font-bold text-xl gradient-text mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined" style="font-size: 24px;">group</span>
                Friend List
            </h3>
            <div id="friendListDiv" class="space-y-2">
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { DOMAIN, socket, alerts } from "./constant.js"

        let ids = [];
        let frndToRemove;
        let divToRemove;
        let sender = {};
        let intervalCopy = {};

        // REVERSE LOADING COUNTDOWN
        function reverseLoading (div, loading, frndReq) {
            let timeLeft = 7 * 1000;
            const totalTime = 7 * 1000;
            const loadingBar = document.getElementById(loading);
            
            let interval = setInterval(() => {
                timeLeft -= 10;
                const widthPercentage = (timeLeft / totalTime) * 100;
                loadingBar.style.width = widthPercentage + "%";

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    document.getElementById(div).classList.replace("translate-x-0", "translate-x-[100%]");
                    setTimeout(() => {
                        document.getElementById(div).remove();
                    }, 700);
                    // FRIEND REQUEST IN NOTIFICATION
                    if(frndReq){
                        fetch(`${DOMAIN}/api/v1/notification/addNoti?sender=${sender[div]}&receiver=${currentUser._id}&type=0`).then(res => {
                            if(res.status < 300) document.getElementById("redDot").classList.remove("hidden");
                        })
                    }
                }
            }, 10);
            intervalCopy[div] = interval;
        };
        
        let currentUser;
        fetch(`${DOMAIN}/api/v1/user/getFriendList`).then(res => res.json())
        .then(user =>{
            if(user){
                console.log(user.data);
                currentUser = user.data
                fullname.innerHTML = currentUser.fullname;
                username.innerHTML = currentUser.username;
                likes.innerHTML = currentUser.likes;
                totalPoints.innerHTML = currentUser.totalPoints;
                avatar.src = currentUser.avatar;
                // UPDATE SOCKET ID IN DB
                fetch(`${DOMAIN}/api/v1/user/updateSocketId/${socket.id}`).then(res => res.json())
                .then(data => currentUser.socketId = data.data.socketId)
                
                // FRIENDS IN THE LIST
                currentUser.friendList.forEach(frnd => {
                    ids.push(frnd._id);
                    let html = `
                        <div class="relative h-14 flex gap-4 p-1 px-1.5 bg-[#ffffff24] rounded-full overflow-hidden">
                            <div data-userid=${frnd._id} class="onOffStatus w-[3.1rem] flex relative">
                                <img width="100%" src=${frnd.avatar} class="rounded-full object-cover">
                            </div>
                            <div>
                                <div class="text-[1.1rem]">${frnd.fullname}</div>
                                <span class="frndID text-[#ffffff9f] text-[0.9rem]">${frnd.username} </span>
                                <span class="copyIDFrnd material-symbols-outlined cursor-pointer ml-1 text-[#ffffff9f]" style="font-size: 1rem;">content_copy</span>
                            </div>
                            <div class="cursor-pointer absolute right-5 h-[82%] flex justify-center items-center">
                                <button data-userid=${frnd._id} class="removeFrndBtn"><span class="material-symbols-outlined text-red-500">group_remove</span></button>
                            </div>
                        </div>
                    `
                    document.getElementById("friendListDiv").insertAdjacentHTML("beforeend", html);
                });

                document.querySelectorAll(".copyIDFrnd").forEach(elem => {
                    elem.addEventListener("click", ()=>{
                        navigator.clipboard.writeText(elem.parentElement.querySelector(".frndID").innerHTML).then(()=>{
                            alerts("ID copied !")
                        })
                    })
                })
            }
            return ids
        })
        // ONLINE - OFFLINE STATUS
        .then((ids)=>{
            fetch(`${DOMAIN}/api/v1/user/onOffStatusPoll`, {
                method: "POST",
                headers:{
                    "Content-type": "application/json"
                },
                body: JSON.stringify({ ids })
            })
            .then(res => res.json())
            .then(data => {
                document.querySelectorAll(".onOffStatus").forEach(elem => {
                    if(data.data[elem.dataset.userid]){
                        let html  = `<div class="absolute rounded-full bottom-0 right-0 p-2 bg-green-500"></div>`;
                        elem.insertAdjacentHTML("beforeend", html);
                    }
                    else{
                        let html = `<div class="absolute rounded-full bottom-0 right-0 p-2 bg-red-500"></div>`;
                        elem.insertAdjacentHTML("beforeend", html);
                    }
                })
            })
        })
        .then(()=>{
            // REMOVE FRIEND
            document.querySelectorAll(".removeFrndBtn").forEach(btn => {
                btn.addEventListener("click", ()=>{
                    frndToRemove = btn.dataset.userid;
                    divToRemove = btn.parentElement.parentElement;
                    document.getElementById("removeFrndDiv").classList.replace("hidden", "flex");
                })
            })
            document.getElementById("noRemove").addEventListener("click", ()=>{
                document.getElementById("removeFrndDiv").classList.replace("flex", "hidden");
            })
            document.getElementById("yesRemove").addEventListener("click", ()=>{
                document.getElementById("removeFrndDiv").classList.replace("flex", "hidden");
                fetch(`${DOMAIN}/api/v1/user/removeFriend/${frndToRemove}`).then(res => res.json())
                .then((data) => divToRemove.remove())
            })
        })

        document.getElementById("username").addEventListener("click", ()=>{
            navigator.clipboard.writeText(document.getElementById("username").innerHTML).then(()=>{
                alerts("ID copied !")
            })
        })

        // EDIT & SAVE AVATAR
        document.getElementById("editAvatar").addEventListener("click", ()=>{
            document.getElementById("avatarInput").click()
        })
        document.getElementById("avatarInput").addEventListener("input", function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById("avatar").setAttribute("src", event.target.result);
                    document.getElementById("saveAvatar").classList.remove("hidden");
                    document.getElementById("saveAvatar").classList.add("flex");
                    document.getElementById("editAvatar").classList.add("hidden");
                    document.getElementById("editAvatar").classList.remove("flex");
                    alerts("Now, Save it !")
                };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById("saveAvatar").addEventListener("click", ()=>{
            document.getElementById("bufferingDiv").classList.replace("hidden", "flex");
            const formData = new FormData(document.getElementById("imageForm"));

            fetch(`${DOMAIN}/api/v1/user/avatar`, {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then((data)=>{
                console.log(data);
                document.getElementById("bufferingDiv").classList.replace("flex", "hidden");
                document.getElementById("saveAvatar").classList.add("hidden");
                document.getElementById("saveAvatar").classList.remove("flex");
                document.getElementById("editAvatar").classList.remove("hidden");
                document.getElementById("editAvatar").classList.add("flex");
            })
        })

        // Logout
        document.getElementById("logOut").addEventListener("click", ()=>{
            document.getElementById("bufferingDiv").classList.replace("hidden", "flex");
            fetch(`${DOMAIN}/api/v1/user/logout`).then(res => res.json())
            .then((data)=>{
                document.getElementById("bufferingDiv").classList.replace("flex", "hidden");
                window.location.href = "/home"
            })
        })

        // FRIEND REQUEST LOGIC
        let i = 1;
        socket.on("frndReq", (user) => {
            sender[`div${i}`] = user._id
            let Div = document.createElement("div");
            Div.classList.add("relative", "z-[100]", "py-3", "flex", "p-3", "gap-3", "text-white", "glass-strong", "border", "border-accent/30", "transition-transform", "duration-700", "ease-in-out", "transform", "translate-x-[100%]", "rounded-2xl", "shadow-glow");
            Div.id = `div${i}`;
            Div.innerHTML = `
                <div class="flex justify-center items-center">
                    <img class="w-14 h-14 rounded-xl object-cover ring-2 ring-accent/30" src="${user.avatar}" />
                </div>
                <div class="flex-1 min-w-0">
                    <div class="font-display font-bold text-sm text-accent-light">Friend Request</div>
                    <div class="font-semibold text-white truncate">${user.fullname}</div>
                    <div class="text-white/50 text-sm truncate">${user.username}</div>
                </div>
                <div data-userid=${user._id} class="flex flex-col gap-1.5 justify-center">
                    <button class="accept bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-xl text-emerald-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">check</span>
                    </button>
                    <button class="reject bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-xl text-red-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
                    </button>
                </div>
                <div id="load${i}" class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-accent to-accent-light rounded-full" style="width: 100%;"></div>
            `

            document.getElementById("frndReqDiv").insertAdjacentElement("afterbegin", Div);
            setTimeout(() => {
                Div.classList.replace("translate-x-[100%]", "translate-x-0");
                reverseLoading(`div${i}`, `load${i}`, true);
                
                Div.querySelector(".accept").addEventListener("click", (e)=>{
                    alerts("Friend request accepted !")
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                    fetch(`${DOMAIN}/api/v1/user/acceptFrndReq/${e.currentTarget.parentElement.dataset.userid}`).then(res => res.json())
                    .then(data => {
                        currentUser = data.data.me;
                    })
                })
                Div.querySelector(".reject").addEventListener("click", (e) => {
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                });
                i++;
            }, 50);
        });
        
        // ONLINE - OFFLINE STATUS (POLLING)
        setInterval(() => {
            fetch(`${DOMAIN}/api/v1/user/onOffStatusPoll`, {
                method: "POST",
                headers:{
                    "Content-type": "application/json"
                },
                body: JSON.stringify({ ids })
            })
            .then(res => res.json())
            .then(data => {
                document.querySelectorAll(".onOffStatus").forEach(elem => {
                    if(data.data[elem.dataset.userid]){
                        let html  = `<div class="absolute rounded-full bottom-0 right-0 p-2 bg-green-500"></div>`;
                        elem.insertAdjacentHTML("beforeend", html);
                    }
                    else{
                        let html  = `<div class="absolute rounded-full bottom-0 right-0 p-2 bg-red-500"></div>`;
                        elem.insertAdjacentHTML("beforeend", html);
                    }
                })
            })
        }, 5000);

        // GETTING INVITATION FROM FRIEND
        let j = 1;
        socket.on("invitation", ({fullname, username, avatar, _id, roomID})=>{
            let Div = document.createElement("div");
            Div.classList.add("relative", "z-[100]", "py-3", "flex", "p-3", "gap-3", "text-white", "glass-strong", "border", "border-emerald-500/30", "transition-transform", "duration-700", "ease-in-out", "transform", "translate-x-[100%]", "rounded-2xl", "shadow-glow");
            Div.id = `div${i}`;
            Div.innerHTML = `
                <div class="flex justify-center items-center">
                    <img class="w-14 h-14 rounded-xl object-cover ring-2 ring-emerald-500/30" src="${avatar}" />
                </div>
                <div class="flex-1 min-w-0">
                    <div class="font-display font-bold text-sm text-emerald-400">Room Invitation</div>
                    <div class="font-semibold text-white truncate">${fullname}</div>
                    <div class="text-white/50 text-sm truncate">${username}</div>
                </div>
                <div data-userid=${_id} class="flex flex-col gap-1.5 justify-center">
                    <button class="accept bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-xl text-emerald-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">check</span>
                    </button>
                    <button class="reject bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-xl text-red-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
                    </button>
                </div>
                <div id="load${i}" class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full" style="width: 100%;"></div>
            `

            document.getElementById("frndReqDiv").insertAdjacentElement("afterbegin", Div);
            setTimeout(() => {
                Div.classList.replace("translate-x-[100%]", "translate-x-0");
                reverseLoading(`div${i}`, `load${i}`, false);
                
                Div.querySelector(".accept").addEventListener("click", (e)=>{
                    document.getElementById("bufferingDiv").classList.replace("hidden", "flex")
                    document.getElementById("showMessage").innerHTML = "Joining you to a room..."
                    clearInterval(intervalCopy[Div.id]);
                    fetch(`${DOMAIN}/api/v1/room/join/${roomID}`).then(res => res.json())
                    .then(data => {
                        window.location.href = `/room?roomID=${data.data._id}&admin=false`;
                    })
                })

                Div.querySelector(".reject").addEventListener("click", (e) => {
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                });
                i++;
            }, 50);
        })

    </script>

</body>

</html>
