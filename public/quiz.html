<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - Playing</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-surface text-white font-sans bg-dots min-h-screen">
    <!-- Ambient background -->
    <div class="fixed inset-0 bg-mesh pointer-events-none"></div>

    <div id="nextAlert" class="fixed hidden top-20 left-1/2 -translate-x-1/2 glass-strong py-3 px-5 rounded-xl z-[100] text-white font-semibold text-sm animate-slide-down border border-accent/20 shadow-glow">
        <span class="text-accent-light">Only the admin</span> can proceed to next question
    </div>

    <header class="sticky inset-x-0 top-0 z-50 w-full glass border-b border-white/5 px-4">
        <nav class="mx-auto flex max-w-7xl justify-between items-center py-3">
            <a href="/home" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow group-hover:shadow-glow-lg transition-shadow duration-300">
                    <span class="text-white font-display font-bold text-lg">Q</span>
                </div>
                <span class="font-display font-bold text-xl gradient-text hidden sm:block">QUIZ ARENA</span>
            </a>

            <!-- Timer -->
            <div class="flex items-center gap-2">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow animate-glow">
                    <h1 id="countDown" class="text-2xl font-display font-bold text-white">30</h1>
                </div>
            </div>
        </nav>
    </header>

    <div class="relative">
        <!-- First answer banner -->
        <div class="py-3 px-6 flex justify-center">
            <span id="firstAnswerDiv" class="text-sm font-medium hidden glass-strong py-2 px-4 rounded-full border border-emerald-500/20 animate-slide-down">
                <span class="material-symbols-outlined text-emerald-400 align-middle mr-1" style="font-size: 18px;">emoji_events</span>
                <a id="firstAnswerUser" class="text-emerald-400 font-semibold"></a>
                answered first!
            </span>
        </div>
    </div>

    <div class="flex justify-center p-4 relative">
        <div class="card max-w-2xl w-full animate-slide-up">
            <!-- Question -->
            <div class="mb-6">
                <span id="noOfQ" class="badge bg-accent/10 text-accent-light ring-accent/20 text-sm mb-3 inline-block"></span>
                <p id="question" class="font-semibold text-lg leading-relaxed text-white/90"></p>
            </div>

            <!-- Options -->
            <div id="optionsDiv" class="space-y-3">
            </div>

            <button id="nextBtn" class="btn-primary mt-6 flex items-center gap-2">
                <span>Next</span>
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { DOMAIN, socket } from "./constant.js"

        const params = new URLSearchParams(window.location.search);
        const roomID = params.get("roomID");
        const admin = params.get("admin");
        const topic = params.get("topic");
        const leadID = params.get("leadID");
        const totalParti = params.get("totalParti");
        const answerLS = localStorage.getItem("answer");
        let currentUser;

        // Helper to lock option buttons after selection
        function lockOptions() {
            document.querySelectorAll(".optionButton").forEach(btn => {
                btn.classList.remove("hover:border-accent/50", "hover:bg-white/[0.04]", "hover:text-white");
            });
        }

        fetch(`${DOMAIN}/api/v1/user/getCurrentUser`).then(res => res.json())
        .then(user =>{
            if(user){
                currentUser = user.data
            }
        })

        // WILL ALWAYS BE IN THE ROOM
        socket.emit("joinQuiz", { roomID, topic });

        socket.on("countDown", (timer) => {
            document.getElementById("countDown").innerHTML = timer;
        })

        if(localStorage.getItem("firstAnswer")){
            document.getElementById("firstAnswerUser").innerHTML = localStorage.getItem("firstAnswer");
            document.getElementById("firstAnswerDiv").classList.remove("hidden");
        }

        socket.on("currentQuestion", ({ question, options, answer, qNo }) => {
            document.getElementById("nextBtn").disabled = false;
            document.getElementById("optionsDiv").innerHTML = "";
            document.getElementById("noOfQ").innerHTML = "Q" + qNo;
            document.getElementById("optionsDiv").dataset.answer = answer;
            document.getElementById("question").innerHTML = question;
            options.forEach((option, index) => {
                let html = `
                    <button id=${"o" + (++index)} class="optionButton w-full border border-white/10 hover:border-accent/50 hover:bg-white/[0.04] px-5 py-3.5 rounded-xl text-left transition-all duration-200 text-white/80 hover:text-white font-medium"> ${option} </button>
                `
                document.getElementById("optionsDiv").insertAdjacentHTML("beforeend", html);
            });
            // CHOOSING CORRECT / WRONG ANSWER
            document.querySelectorAll(".optionButton").forEach(btn => {
                const answerLS = localStorage.getItem("answer");

                if (answerLS) {
                    const obj = JSON.parse(answerLS);
                    document.querySelectorAll(".optionButton").forEach(button => {
                        button.disabled = true;
                    });
                    lockOptions();

                    document.querySelectorAll(".optionButton").forEach(button => {
                        if (button.id === obj.correctAnswer) {
                            button.classList.add("bg-green-500");
                        } else if (button.id === obj.myAnswer) {
                            button.classList.add("bg-red-500");
                        }
                    });
                }

                btn.addEventListener("click", (e) => {
                    const points = Number(document.getElementById("countDown").innerHTML);
                    const correctAnswer = e.currentTarget.parentElement.dataset.answer;
                    const myAnswer = e.currentTarget.id;

                    localStorage.setItem("answer", JSON.stringify({
                        correctAnswer: correctAnswer,
                        myAnswer: myAnswer
                    }));

                    document.querySelectorAll(".optionButton").forEach(button => {
                        button.disabled = true;
                    });
                    lockOptions();

                    if (myAnswer === correctAnswer) {
                        e.currentTarget.classList.add("bg-green-500");
                        // FIRST TO ANSWER LOGIC
                        if(!localStorage.getItem("firstAnswer")){
                            socket.emit("firstAnswer", { roomID, fullname: currentUser.fullname })
                        }
                        // CORRECT ANSWER LOGIC
                        fetch(`${DOMAIN}/api/v1/leaderboard/updatePoints/${leadID}/${roomID}?totalParti=${totalParti}`, {
                            method: "POST",
                            headers: {
                                "Content-type": "application/json"
                            },
                            body: JSON.stringify({
                                id: currentUser._id,
                                points
                            })
                        })
                        .then(res => res.json())
                        .then(data => {
                            console.log("Move on --> ", data.data.moveOn);
                            if(data.data.moveOn && points > 4){
                                setTimeout(() => {
                                    socket.emit("nextQuestion", roomID)
                                }, 1500);
                            }
                        })
                    }
                    else {
                        e.currentTarget.classList.add("bg-red-500");
                        document.querySelectorAll(".optionButton").forEach(button => {
                            if (button.id === correctAnswer) {
                                button.classList.add("bg-green-500");
                            }
                        });
                        
                        // WRONG ANSWER LOGIC
                        fetch(`${DOMAIN}/api/v1/leaderboard/updatePoints/${leadID}/${roomID}?totalParti=${totalParti}`, {
                            method: "POST",
                            headers: {
                                "Content-type": "application/json"
                            },
                            body: JSON.stringify({
                                id: currentUser._id,
                                points: -5
                            })
                        })
                        .then(res => res.json())
                        .then(data => {
                            console.log("Move on --> ", data.data.moveOn);
                            if(data.data.moveOn && points > 4){
                                setTimeout(() => {
                                    socket.emit("nextQuestion", roomID)
                                }, 1500);
                            }
                        })
                    }
                });
            });
        })

        socket.on("newQuestion", ({ question, options, answer, qNo }) => {
            document.getElementById("nextBtn").disabled = false;
            localStorage.clear("answer");
            localStorage.clear("firstAnswer");
            document.getElementById("firstAnswerDiv").classList.add("hidden");
            document.getElementById("noOfQ").innerHTML = "Q" + qNo;
            document.getElementById("optionsDiv").innerHTML = "";
            document.getElementById("optionsDiv").dataset.answer = answer;
            document.getElementById("question").innerHTML = question;
            options.forEach((option, index) => {
                let html = `
                    <button id=${"o" + (++index)} class="optionButton w-full border border-white/10 hover:border-accent/50 hover:bg-white/[0.04] px-5 py-3.5 rounded-xl text-left transition-all duration-200 text-white/80 hover:text-white font-medium"> ${option} </button>
                `
                document.getElementById("optionsDiv").insertAdjacentHTML("beforeend", html);
            });
            // CHOOSING CORRECT / WRONG ANSWER
            document.querySelectorAll(".optionButton").forEach(btn => {
                const answerLS = localStorage.getItem("answer");

                if (answerLS) {
                    const obj = JSON.parse(answerLS);
                    btn.disabled = true;

                    if (obj.correctAnswer === btn.id) {
                        btn.classList.add("bg-green-500");
                    } else if (obj.myAnswer === btn.id && obj.correctAnswer !== obj.myAnswer) {
                        btn.classList.add("bg-red-500");
                    }
                } 
                else {
                    btn.addEventListener("click", (e) => {
                        const correctAnswer = e.currentTarget.parentElement.dataset.answer;
                        const myAnswer = e.currentTarget.id;
                        const points = Number(document.getElementById("countDown").innerHTML);

                        localStorage.setItem("answer", JSON.stringify({
                            correctAnswer: correctAnswer,
                            myAnswer: myAnswer
                        }));

                        document.querySelectorAll(".optionButton").forEach(btn => {
                            btn.disabled = true;
                        });
                        lockOptions();

                        if (myAnswer === correctAnswer) {
                            e.currentTarget.classList.add("bg-green-500");
                            if(!localStorage.getItem("firstAnswer")){
                                socket.emit("firstAnswer", { roomID, fullname: currentUser.fullname })
                            }
                            // CORRECT ANSWER LOGIC
                            fetch(`${DOMAIN}/api/v1/leaderboard/updatePoints/${leadID}/${roomID}?totalParti=${totalParti}`, {
                                method: "POST",
                                headers: {
                                    "Content-type": "application/json"
                                },
                                body: JSON.stringify({
                                    id: currentUser._id,
                                    points
                                })
                            })
                            .then(res => res.json())
                            .then(data => {
                                console.log("Move on --> ", data.data.moveOn);
                                if(data.data.moveOn && points > 4){
                                    setTimeout(() => {
                                        socket.emit("nextQuestion", roomID)
                                    }, 1500);
                                }
                            })
                        }
                        else {
                            e.currentTarget.classList.add("bg-red-500");
                            
                            // WRONG ANSWER LOGIC
                            fetch(`${DOMAIN}/api/v1/leaderboard/updatePoints/${leadID}/${roomID}?totalParti=${totalParti}`, {
                                method: "POST",
                                headers: {
                                    "Content-type": "application/json"
                                },
                                body: JSON.stringify({
                                    id: currentUser._id,
                                    points: -5
                                })
                            })
                            .then(res => res.json())
                            .then(data => {
                                console.log("Move on --> ", data.data.moveOn);
                                if(data.data.moveOn && points > 4){
                                    setTimeout(() => {
                                        socket.emit("nextQuestion", roomID)
                                    }, 1500);
                                }
                            })
                            document.querySelectorAll(".optionButton").forEach(btn => {
                                if (btn.id === correctAnswer) {
                                    btn.classList.add("bg-green-500");
                                }
                            });
                        }
                    });
                }
            });
        })

        // FIRST TO ANSWER EVENT LISTENER
        socket.on("firstUserToAns", (fullname)=>{
            if(!localStorage.getItem("firstAnswer")){
                localStorage.setItem("firstAnswer", fullname)
                document.getElementById("firstAnswerUser").innerHTML = fullname;
                document.getElementById("firstAnswerDiv").classList.remove("hidden");
            }
        })

        // NEXT BUTTON LOGIC
        document.getElementById("nextBtn").addEventListener("click", ()=>{
            if(admin == "true"){
                document.getElementById("nextBtn").disabled = true;
                socket.emit("nextQuestion", roomID);
            }
            else{
                document.getElementById("nextAlert").classList.remove("hidden");
                setInterval(() => {
                    document.getElementById("nextAlert").classList.add("hidden");
                }, 3000);
            }
        })

        // QUIZ HAS ENDED ERROR
        socket.on("quizFinishedError", ()=>{
            document.getElementsByTagName("body")[0].innerHTML = `<div class="text-center text-[#a66ffe] font-bold text-2xl py-4">Quiz has ended</div>`
        })

        // END OF QUIZ ---> LEADERBOARD
        socket.on("navigateToLead", ()=>{
            localStorage.removeItem("firstAnswer")
            localStorage.removeItem("answer")
            window.location.href = `/leaderboard?leadID=${leadID}&userID=${currentUser._id}&roomID=${roomID}`;
        })


    </script>
</body>
