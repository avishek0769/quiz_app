<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Arena</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="font-sans bg-surface min-h-screen bg-dots">
    <!-- Ambient background glow -->
    <div class="fixed inset-0 bg-mesh pointer-events-none"></div>

    <header class="sticky inset-x-0 top-0 z-50 w-full glass border-b border-white/5 px-4">
        <nav class="mx-auto flex max-w-7xl justify-between items-center py-3">
            <a href="/home" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow group-hover:shadow-glow-lg transition-shadow duration-300">
                    <span class="text-white font-display font-bold text-lg">Q</span>
                </div>
                <span class="font-display font-bold text-xl gradient-text hidden sm:block">QUIZ ARENA</span>
            </a>
        </nav>
    </header>

    <div id="bufferingDiv" class="hidden flex-col gap-3 items-center fixed inset-0 z-50 justify-center bg-black/70 backdrop-blur-sm">
        <div id="showMessage" class="text-white text-xl text-center font-semibold"> Please wait... </div>
        <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></dotlottie-player>
    </div>

    <div class="relative min-h-[calc(100vh-65px)] flex items-center justify-center overflow-y-auto text-white">

        <div id="alertDiv" class="fixed top-20 flex flex-col justify-center items-center w-screen z-[100] gap-2">
        </div>

        <div class="mx-auto w-full max-w-md px-4 py-10 animate-slide-up">
            <!-- Card -->
            <div class="card p-8 sm:p-10">
                <!-- Icon -->
                <div class="flex justify-center mb-6">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow animate-float">
                        <span class="material-symbols-outlined text-white" style="font-size: 32px;">login</span>
                    </div>
                </div>

                <h1 class="font-display font-bold text-3xl gradient-text text-center mb-2">Welcome Back</h1>
                <p class="text-white/40 text-center mb-8 text-sm">Sign in to continue your quiz journey</p>

                <div class="space-y-5">
                    <div>
                        <label for="username" class="block mb-2 text-sm font-medium text-white/60">Username</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/30" style="font-size: 20px;">person</span>
                            <input id="username" type="text" placeholder="Enter your username"
                                class="input-field pl-10" />
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block mb-2 text-sm font-medium text-white/60">Password</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/30" style="font-size: 20px;">lock</span>
                            <input id="password" type="password" placeholder="Enter your password"
                                class="input-field pl-10" />
                        </div>
                    </div>

                    <button id="logInSubmit" class="btn-primary w-full text-center">
                        <span>Log in</span>
                    </button>
                </div>

                <div class="mt-6 text-center text-sm text-white/40">
                    Don't have an account? 
                    <a href="/signup" class="text-accent-light hover:text-accent font-semibold transition-colors">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { DOMAIN, alerts } from "./constant.js"
        
        document.getElementById("logInSubmit").addEventListener("click", () => {
            document.getElementById("logInSubmit").disabled = true;
            let username = document.getElementById("username").value.trim()
            let password = document.getElementById("password").value.trim()
            
            if (username != "" && password != "") {
                document.getElementById("bufferingDiv").classList.replace("hidden", "flex");
                fetch(`${DOMAIN}/api/v1/user/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username, password
                    })
                })
                .then(res => {
                    document.getElementById("logInSubmit").disabled = false;
                    if(res.status > 399){
                        document.getElementById("bufferingDiv").classList.replace("flex", "hidden");
                        alerts("User credentials are wrong !")
                        return undefined
                    }
                    return res.json()
                })
                .then(data => {
                    if(data) window.location.href = "/home"
                })
            }
            else {
                alerts("Both username & password are required")
                document.getElementById("logInSubmit").disabled = false;
            }
        })

    </script>

</body>

</html>
