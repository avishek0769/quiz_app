<!DOCTYPE html>
<html class="overflow-hidden" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-surface font-sans overflow-hidden">
    <!-- Ambient background -->
    <div class="fixed inset-0 bg-mesh pointer-events-none"></div>
    <div class="fixed inset-0 bg-dots pointer-events-none opacity-50"></div>

    <div id="bufferingDiv" class="hidden flex-col gap-3 items-center fixed inset-0 z-[100] justify-center bg-black/70 backdrop-blur-sm">
        <div id="showMessage" class="text-white text-xl text-center font-semibold"> Please wait </div>
        <dotlottie-player src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></dotlottie-player>
    </div>

    <div id="alertDiv" class="fixed top-20 flex flex-col justify-center items-center w-screen z-[100] gap-2">
    </div>

    <div id="frndReqDiv" class="overflow-hidden space-y-3 fixed w-screen bottom-10 pl-4 pr-1 z-[90]">
    </div>

    <header class="sticky inset-x-0 top-0 z-50 w-full glass border-b border-white/5 px-4">
        <nav class="mx-auto flex max-w-7xl justify-between items-center py-3">
            <a href="/home" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow group-hover:shadow-glow-lg transition-shadow duration-300">
                    <span class="text-white font-display font-bold text-lg">Q</span>
                </div>
                <span class="font-display font-bold text-xl gradient-text hidden sm:block">QUIZ ARENA</span>
            </a>

            <!-- Nav actions -->
            <div class="flex items-center gap-3 text-white">
                <button id="logIn" class="hidden btn-outline py-2 px-4 text-sm">Log in</button>
                <button id="signUp" class="hidden btn-primary py-2 px-4 text-sm">Sign up</button>
                <div id="notiDiv" class="hidden justify-center items-center relative">
                    <div id="redDot" class="hidden rounded-full bg-red-500 w-2.5 h-2.5 absolute -top-0.5 -right-0.5 z-10 animate-pulse"></div>
                    <button id="notificationBell" class="w-10 h-10 rounded-xl glass-strong flex items-center justify-center hover:bg-white/10 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 22px;">notifications</span>
                    </button>
                </div>
                <div id="searchBtnDiv" class="hidden justify-center items-center">
                    <button id="searchBtn" class="w-10 h-10 rounded-xl glass-strong flex items-center justify-center hover:bg-white/10 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 22px;">search</span>
                    </button>
                </div>
                <img id="userAcc" width="40" class="rounded-xl object-cover w-10 h-10 ring-2 ring-accent/30 cursor-pointer hover:ring-accent/60 transition-all hidden" />
            </div>
        </nav>
    </header>    

    <div class="h-[calc(100vh-65px)] overflow-y-auto relative">
        <div class="flex justify-center items-center p-4 min-h-[calc(100vh-65px)]">
            <div class="card max-w-lg w-full animate-slide-up text-center">
                <!-- Hero icon -->
                <div class="flex justify-center mb-6">
                    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-accent-dark to-accent flex items-center justify-center shadow-glow-lg animate-float">
                        <span class="material-symbols-outlined text-white" style="font-size: 40px;">quiz</span>
                    </div>
                </div>
                <h1 class="font-display font-bold text-3xl sm:text-4xl gradient-text mb-3">Welcome to Quiz Arena!</h1>
                <p class="text-white/50 text-base leading-relaxed mb-8 max-w-md mx-auto">
                    Challenge your friends in real-time quiz battles. Sign up, create or join a room, and prove you're the smartest!
                </p>
                <div class="flex justify-center gap-4">
                    <button id="joinRoomBtn" class="btn-outline flex items-center gap-2">
                        <span class="material-symbols-outlined" style="font-size: 20px;">meeting_room</span>
                        Join Room
                    </button>
                    <button id="createRoomBtn" class="btn-primary flex items-center gap-2">
                        <span class="material-symbols-outlined" style="font-size: 20px;">add_circle</span>
                        Create Room
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomDiv" class="w-screen h-screen bg-black/60 backdrop-blur-sm hidden fixed top-0 left-0 z-50 items-center justify-center">
        <div class="card max-w-sm w-[90%] relative animate-scale-in p-6">
            <button id="closeCreateRoom" class="absolute right-4 top-4 w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center transition-colors text-white/60 hover:text-white">
                <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
            </button>
            
            <h2 class="font-display font-bold text-xl gradient-text mb-5">Create a Room</h2>
            
            <label for="roomName" class="block mb-2 text-sm font-medium text-white/60">Room name</label>
            <input id="roomName" type="text" placeholder="Enter your Room name" class="input-field mb-5" />

            <div class="text-sm font-medium text-white/60 mb-3">Quiz Topic</div>

            <div class="space-y-2 mb-6">
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="gk" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">General Knowledge</span>
                </label>
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="cs" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">Computer Science</span>
                </label>
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="maths" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">Mathematics</span>
                </label>
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="sports" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">Sports</span>
                </label>
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="geo" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">Geography</span>
                </label>
                <label class="flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:border-accent/30 hover:bg-white/[0.03] transition-all cursor-pointer group">
                    <input id="anime" name="quizTopic" type="radio" class="topics w-4 h-4 accent-accent" />
                    <span class="text-white/70 group-hover:text-white/90 transition-colors">Anime / Manga</span>
                </label>
            </div>

            <button id="createRoomSubmit" class="btn-primary w-full text-center">Create Room</button>
        </div>
    </div>

    <!-- Join Room Modal -->
    <div id="joinRoomDiv" class="w-screen h-screen bg-black/60 backdrop-blur-sm hidden fixed top-0 left-0 z-50 items-center justify-center">
        <div class="card max-w-sm w-[90%] relative animate-scale-in p-6">
            <button id="closeJoinRoom" class="absolute right-4 top-4 w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center transition-colors text-white/60 hover:text-white">
                <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
            </button>

            <h2 class="font-display font-bold text-xl gradient-text mb-5">Join a Room</h2>

            <label for="roomID" class="block mb-2 text-sm font-medium text-white/60">Room ID</label>
            <input id="roomID" type="text" placeholder="Paste the Room ID here" class="input-field mb-5" />

            <button id="joinRoomSubmit" disabled class="btn-primary w-full text-center disabled:opacity-40">Join Room</button>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="searchDiv" class="h-[90vh] hidden overflow-y-auto text-white w-[94vw] max-w-lg card fixed top-1/2 -translate-y-1/2 left-1/2 -translate-x-1/2 z-50 p-5 animate-scale-in">
        <button id="crossSearch" class="absolute right-4 top-4 w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center transition-colors text-white/60 hover:text-white">
            <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
        </button>
        <h2 class="font-display font-bold text-xl gradient-text mb-4">Search Friends</h2>
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-white/30" style="font-size: 20px;">search</span>
            <input id="searchInput" type="text" class="input-field pl-10" placeholder="Search by username or fullname">
        </div>
        <div id="searchResults" class="mt-5 space-y-2">
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationDiv" class="h-[90vh] hidden overflow-y-auto text-white w-[94vw] max-w-lg card fixed top-1/2 -translate-y-1/2 left-1/2 -translate-x-1/2 z-50 p-5 animate-scale-in">
        <button id="crossNoti" class="absolute right-4 top-4 w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center transition-colors text-white/60 hover:text-white">
            <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
        </button>
        <h2 class="font-display font-bold text-xl gradient-text mb-4">Notifications</h2>
        <div id="notiResults" class="mt-2 space-y-2">
        </div>
    </div>

    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module">
        import { DOMAIN, socket, alerts} from "./constant.js"
        let currentUser;
        let sender = {};
        let intervalCopy = {};

        // REVERSE LOADING COUNTDOWN
        function reverseLoading (div, loading, frndReq) {
            let timeLeft = 7 * 1000;
            const totalTime = 7 * 1000;
            const loadingBar = document.getElementById(loading);
            
            let interval = setInterval(() => {
                timeLeft -= 10;
                const widthPercentage = (timeLeft / totalTime) * 100;
                loadingBar.style.width = widthPercentage + "%";

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    document.getElementById(div).classList.replace("translate-x-0", "translate-x-[100%]");
                    setTimeout(() => {
                        document.getElementById(div).remove();
                    }, 700);
                    // FRIEND REQUEST IN NOTIFICATION
                    if(frndReq){
                        fetch(`${DOMAIN}/api/v1/notification/addNoti?sender=${sender[div]}&receiver=${currentUser._id}&type=0`).then(res => {
                            if(res.status < 300) document.getElementById("redDot").classList.remove("hidden");
                        })
                    }
                }
            }, 10);
            intervalCopy[div] = interval;
        };

        socket.on('connect', () => {
            fetch(`${DOMAIN}/api/v1/user/getCurrentUser`).then(res => res.json())
            .then(user =>{
                if(user){
                    currentUser = user.data;
                    userAcc.src = currentUser.avatar;
                    searchBtnDiv.classList.replace("hidden", "flex")
                    notiDiv.classList.replace("hidden", "flex")
                    userAcc.classList.remove("hidden")
                    logIn.classList.add("hidden");
                    signUp.classList.add("hidden");
                    if(currentUser.notification) document.getElementById("redDot").classList.remove("hidden");
                    console.log(currentUser);
                    fetch(`${DOMAIN}/api/v1/user/updateSocketId/${socket.id}`).then(res => res.json())
                    .then(data => currentUser.socketId = data.data.socketId)
                }
                else{
                    logIn.classList.remove("hidden")
                    signUp.classList.remove("hidden")
                }
            })
            .catch(error => {
                fetch(`${DOMAIN}/api/v1/user/refreshAccessToken`).then(res => {
                    if(res.status > 399) return undefined;
                    return res.json()
                })
                .then(data => {
                    if(data) window.location.reload();
                    else{
                        logIn.classList.remove("hidden")
                        signUp.classList.remove("hidden")
                    }
                })
            })
        });
        
        document.getElementById("signUp").addEventListener("click", () => {
            window.location.href = "/signup"
        })
        document.getElementById("logIn").addEventListener("click", () => {
            window.location.href = "/login"
        })

        document.getElementById("createRoomBtn").addEventListener("click", () => {
            if(currentUser) document.getElementById("createRoomDiv").classList.replace("hidden", "flex");
            else window.location.href = "/signup";
        })
        document.getElementById("joinRoomBtn").addEventListener("click", () => {
            if (currentUser) document.getElementById("joinRoomDiv").classList.replace("hidden", "flex");
            else window.location.href = "/signup";
        })
        document.getElementById("closeCreateRoom").addEventListener("click", () => {
            document.getElementById("createRoomDiv").classList.replace("flex", "hidden");
        })
        document.getElementById("closeJoinRoom").addEventListener("click", () => {
            document.getElementById("joinRoomDiv").classList.replace("flex", "hidden");
        })
        
        // CREATE ROOM
        document.getElementById("createRoomSubmit").addEventListener("click", ()=>{
            const topicChoosed = Array.from(document.querySelectorAll(".topics")).filter(inp => inp.checked);
            const roomName = document.getElementById("roomName").value;

            if(roomName != "" && topicChoosed.length == 1){
                fetch(`${DOMAIN}/api/v1/room/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: document.getElementById("roomName").value,
                        topic: topicChoosed[0].id
                    })
                })
                .then(res => res.json())
                .then(data =>{
                    console.log(data);
                    window.location.href = `/room?roomID=${data.data._id}&admin=true`;
                })
            }
            else{
                alerts("Room name & topic, both are compulsory !"); 
            }
        })

        //JOIN ROOM
        const roomIDInput = document.getElementById("roomID");
        roomIDInput.addEventListener("input", (e)=>{
            if(roomIDInput.value.length >= 24) document.getElementById("joinRoomSubmit").disabled = false;
            else document.getElementById("joinRoomSubmit").disabled = true;
        })

        document.getElementById("joinRoomSubmit").addEventListener("click", ()=>{
            fetch(`${DOMAIN}/api/v1/room/join/${roomIDInput.value.trim()}`).then((res)=> {
                console.log(res.status);
                if(res.status > 399) {
                    alerts("Room not found, id is wrong !");
                    return undefined;
                }
                return res.json()
            })
            .then((data)=>{
                if(data) window.location.href = `/room?roomID=${data.data._id}&admin=false`;
            })
        })

        // USER ACCOUNT
        document.getElementById("userAcc").addEventListener("click", ()=>{
            window.location.href = "/myAccount";
        })

        document.getElementById("crossSearch").addEventListener("click", ()=>{
            document.getElementById("searchDiv").classList.add("hidden")
            document.getElementById("searchInput").value = ""
            document.getElementById("searchResults").innerHTML = "";
        })
        document.getElementById("searchBtn").addEventListener("click", ()=>{
            document.getElementById("searchDiv").classList.remove("hidden");
        })

        // SEARCH FRIEND LOGIC
        let a = -1;
        document.getElementById("searchInput").addEventListener("input", (e)=>{
            document.getElementById("searchResults").innerHTML = `
                <div id="bufferingDivSearch" class="flex flex-col gap-3 items-center absolute z-[100] w-[90%] justify-center bg-[#000000bd] ">
                    <dotlottie-player class="" src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 50px; height: 50px;" loop autoplay></dotlottie-player>
                </div>
            `
            let searchValue = e.currentTarget.value
            clearTimeout(a);
            a = setTimeout(() => {
                if(searchValue != ""){
                    fetch(`${DOMAIN}/api/v1/user/search?search=${searchValue}`).then(res => res.json())
                    .then((data)=>{
                        let mergedUsers = [...data.data.usersByFullname, ...data.data.usersByUsername]
                        .filter((user, index, array) =>
                            index === array.findIndex(obj => (
                                obj._id === user._id
                            )
                        ))
                        document.getElementById("searchResults").innerHTML = "";
                        if(mergedUsers.length == 0) document.getElementById("searchResults").innerHTML = "Not found !!";
                        mergedUsers.forEach(elem => {
                            let html = `
                                <div class=" h-14 flex p-1 px-1.5 bg-[#ffffff24] rounded-full overflow-hidden">
                                    <div class="w-[3.1rem] flex">
                                        <img width="100%" class="rounded-full object-cover" src=${elem.avatar} />
                                    </div>
                                    <div class="w-fit flex flex-col justify-center ml-2">
                                        <div>${elem.fullname}</div>
                                        <span class="frndID text-[#ffffff9f] text-[0.9rem]">${elem.username}</span>
                                    </div>
                                    <div data-socketid=${elem.socketId} data-userid=${elem._id} class="${currentUser.friendList.includes(elem._id)? "hidden" : ""} ${currentUser._id == elem._id? "hidden" : ""} ml-auto flex items-center">
                                        <button class="addFriend p-1.5 material-symbols-outlined rounded-full text-black disabled:bg-green-200 bg-green-400">
                                            <span class="material-symbols-outlined">person_add</span>
                                        </button>
                                    </div>
                                </div>
                            `
                            document.getElementById("searchResults").insertAdjacentHTML("beforeend", html);
                        })
                    })
                    .then(()=>{
                        // SENDING A FRIEND REQUEST LOGIC
                        document.querySelectorAll(".addFriend").forEach(btn =>{
                            btn.addEventListener("click", (e)=>{
                                btn.disabled = true;
                                let socketID = e.currentTarget.parentElement.dataset.socketid;
                                let userID = e.currentTarget.parentElement.dataset.userid;
                                // Web Scokets with HTTP
                                fetch(`${DOMAIN}/api/v1/user/sendFrndReq`, {
                                    method: "POST",
                                    headers:{
                                        "Content-type": "application/json"
                                    },
                                    body: JSON.stringify({
                                        userID,
                                        currentUser,
                                        roomPart: false
                                    })
                                })
                                setTimeout(() => {
                                    btn.disabled = false;
                                }, 7000);
                            })
                        })
                    })
                }
                else{
                    document.getElementById("searchResults").innerHTML = "";
                }
            }, 700);
        })

        // PERSON 2 ACCEPTED MY FRIEND REQUEST
        socket.on("frndReqAccepted", ({frndName, frndID})=>{
            alerts(`${frndName} accepted your friend request !`)
        })

        // GETTING A FRIEND REQUEST LOGIC
        let i = 1;
        socket.on("frndReq", (user) => {
            sender[`div${i}`] = user._id
            let Div = document.createElement("div");
            Div.classList.add("relative", "z-[100]", "py-3", "flex", "p-3", "gap-3", "text-white", "glass-strong", "border", "border-accent/30", "transition-transform", "duration-700", "ease-in-out", "transform", "translate-x-[100%]", "rounded-2xl", "shadow-glow");
            Div.id = `div${i}`;
            Div.innerHTML = `
                <div class="flex justify-center items-center">
                    <img class="w-14 h-14 rounded-xl object-cover ring-2 ring-accent/30" src="${user.avatar}" />
                </div>
                <div class="flex-1 min-w-0">
                    <div class="font-display font-bold text-sm text-accent-light">Friend Request</div>
                    <div class="font-semibold text-white truncate">${user.fullname}</div>
                    <div class="text-white/50 text-sm truncate">${user.username}</div>
                </div>
                <div data-userid=${user._id} class="flex flex-col gap-1.5 justify-center">
                    <button class="accept bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-xl text-emerald-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">check</span>
                    </button>
                    <button class="reject bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-xl text-red-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
                    </button>
                </div>
                <div id="load${i}" class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-accent to-accent-light rounded-full" style="width: 100%;"></div>
            `

            document.getElementById("frndReqDiv").insertAdjacentElement("afterbegin", Div);
            setTimeout(() => {
                Div.classList.replace("translate-x-[100%]", "translate-x-0");
                reverseLoading(`div${i}`, `load${i}`, true);
                
                Div.querySelector(".accept").addEventListener("click", (e)=>{
                    e.currentTarget.disabled = true;
                    alerts("Friend request accepted !")
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                    fetch(`${DOMAIN}/api/v1/user/acceptFrndReq/${e.currentTarget.parentElement.dataset.userid}`).then(res => res.json())
                    .then(data => {
                        currentUser = data.data.me;
                    })
                })
                Div.querySelector(".reject").addEventListener("click", (e) => {
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                });
                i++;
            }, 50);
        });

        // NOTIFICATION OF FRIEND REQUEST
        document.getElementById("crossNoti").addEventListener("click", ()=>{
            document.getElementById("notificationDiv").classList.add("hidden")
        })
        document.getElementById("notificationBell").addEventListener("click", ()=>{
            document.getElementById("notificationDiv").classList.remove("hidden")
        })

        document.getElementById("notificationBell").addEventListener("click", ()=>{
            document.getElementById("redDot").classList.add("hidden");
            document.getElementById("notiResults").innerHTML = `
                <div id="bufferingDiv1" class="hidden items-center absolute z-[100] w-[95%] justify-center bg-[#000000bd] ">
                    <dotlottie-player class="" src="https://lottie.host/27feff6c-53ae-48c7-9539-9a37724286be/8okSjWIQl7.json" background="transparent" speed="1" style="width: 50px; height: 50px;" loop autoplay></dotlottie-player>
                </div>
            `
            fetch(`${DOMAIN}/api/v1/notification/getNoti`).then(res => res.json())
            .then(data => {
                document.getElementById("notiResults").innerHTML = ""
                if(data.data.length == 0) document.getElementById("notiResults").innerHTML = "No Notifications"
                data.data.forEach(elem => {
                    let html = `
                    <div class="glass-strong rounded-xl p-3 flex items-center gap-3 border border-white/10">
                        <div class="shrink-0">
                            <img src=${elem.sender.avatar} class="object-cover rounded-xl w-11 h-11 ring-2 ring-accent/20">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-white truncate">${elem.sender.fullname}</div>
                            <div class="text-white/50 text-sm">${elem.type == 0? "Sent you a friend request" : "Inviting you to join their room"}</div>                        
                        </div>
                        <div data-notiid=${elem._id} data-userid=${elem.sender._id} class="flex flex-col gap-1.5 shrink-0">
                            <button class="${elem.type == 0? "acceptFrndReq" : "acceptJoining"} w-9 h-9 flex items-center justify-center bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 rounded-xl hover:bg-emerald-500/30 transition-colors">
                                <span class="cursor-pointer material-symbols-outlined" style="font-size: 20px;">${elem.type == 0? "group_add" : "check"}</span>
                            </button>
                            <button class="cancel w-9 h-9 flex items-center justify-center bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl hover:bg-red-500/30 transition-colors">
                                <span class="cursor-pointer material-symbols-outlined" style="font-size: 20px;">close</span>
                            </button>
                        </div>
                    </div>
                    `
                    document.getElementById("notiResults").insertAdjacentHTML("beforeend", html);
                })
            })
            .then(()=>{
                document.querySelectorAll(".acceptFrndReq").forEach(elem => {
                    elem.addEventListener("click", ()=>{
                        fetch(`${DOMAIN}/api/v1/user/acceptFrndReq/${elem.parentElement.dataset.userid}`).then(res => res.json())
                        .then(data => {
                            alerts("Friend request accepted !")
                            fetch(`${DOMAIN}/api/v1/notification/removeNoti/${elem.parentElement.dataset.notiid}`)
                            elem.parentElement.parentElement.remove();
                        })
                    })
                })
                document.querySelectorAll(".cancel").forEach(elem => {
                    elem.addEventListener("click", ()=>{
                        elem.parentElement.parentElement.remove();
                        fetch(`${DOMAIN}/api/v1/notification/removeNoti/${elem.parentElement.dataset.notiid}`)
                    })
                })
            })
        })

        // GETTING INVITATION FROM FRIEND
        let j = 1;
        socket.on("invitation", ({fullname, username, avatar, _id, roomID})=>{
            let Div = document.createElement("div");
            Div.classList.add("relative", "z-[100]", "py-3", "flex", "p-3", "gap-3", "text-white", "glass-strong", "border", "border-emerald-500/30", "transition-transform", "duration-700", "ease-in-out", "transform", "translate-x-[100%]", "rounded-2xl", "shadow-glow");
            Div.id = `div${i}`;
            Div.innerHTML = `
                <div class="flex justify-center items-center">
                    <img class="w-14 h-14 rounded-xl object-cover ring-2 ring-emerald-500/30" src="${avatar}" />
                </div>
                <div class="flex-1 min-w-0">
                    <div class="font-display font-bold text-sm text-emerald-400">Room Invitation</div>
                    <div class="font-semibold text-white truncate">${fullname}</div>
                    <div class="text-white/50 text-sm truncate">${username}</div>
                </div>
                <div data-userid=${_id} class="flex flex-col gap-1.5 justify-center">
                    <button class="accept bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-xl text-emerald-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">check</span>
                    </button>
                    <button class="reject bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-xl text-red-400 flex justify-center items-center w-9 h-9 transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
                    </button>
                </div>
                <div id="load${i}" class="absolute bottom-0 left-0 h-0.5 bg-gradient-to-r from-emerald-500 to-emerald-400 rounded-full" style="width: 100%;"></div>
            `

            document.getElementById("frndReqDiv").insertAdjacentElement("afterbegin", Div);
            setTimeout(() => {
                Div.classList.replace("translate-x-[100%]", "translate-x-0");
                reverseLoading(`div${i}`, `load${i}`, false);
                
                Div.querySelector(".accept").addEventListener("click", (e)=>{
                    document.getElementById("bufferingDiv").classList.replace("hidden", "flex")
                    document.getElementById("showMessage").innerHTML = "Joining you to a room..."
                    clearInterval(intervalCopy[Div.id]);
                    fetch(`${DOMAIN}/api/v1/room/join/${roomID}`).then(res => res.json())
                    .then(data => {
                        window.location.href = `/room?roomID=${data.data._id}&admin=false`;
                    })
                })

                Div.querySelector(".reject").addEventListener("click", (e) => {
                    Div.classList.replace("translate-x-0", "translate-x-[100%]");
                    clearInterval(intervalCopy[Div.id]);
                    setTimeout(() => {
                        Div.remove();
                    }, 700);
                });
                i++;
            }, 50);
        })
        
        localStorage.removeItem("firstAnswer")
        localStorage.removeItem("answer")
    </script>
    
</body>


</html>
